<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POCKET MONSTER — Swirly</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');

:root {
  --void:   #03020a;
  --deep:   #07050f;
  --murk:   #0d0a1a;
  --fog:    #151028;
  --mist:   #1e1830;
  --ecto:   #7affcc;
  --soul:   #c060ff;
  /* Swirly palette */
  --sw-body:  #2060c8;
  --sw-body2: #3080e8;
  --sw-belly: #e8e0d0;
  --sw-belly2:#f8f4ec;
  --sw-tail:  #1848a0;
  --sw-eye:   #0a0a1a;
  /* Wave shape colors */
  --sine-col:   #7affcc;
  --sine-col2:  #a8ffe0;
  --sq-col:     #ff8040;
  --sq-col2:    #ffb090;
  --saw-col:    #c060ff;
  --saw-col2:   #e090ff;
  --tri-col:    #f0c040;
  --tri-col2:   #f8e090;
  --text:   #8a8598;
  --text2:  #504860;
  --text3:  #2a2438;
  --mono:  'DM Mono', monospace;
  --serif: 'Cormorant Garamond', serif;
  --goth:  'UnifrakturMaguntia', cursive;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--void);
  overflow: hidden;
  font-family: var(--mono);
  cursor: none;
}

#cursor {
  position: fixed; width: 20px; height: 20px;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
}
#cursor svg { width: 100%; height: 100%; }

#atmos { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

#app {
  position: relative; width: 100vw; height: 100vh;
  display: flex; flex-direction: column; z-index: 1;
}

/* ── HEADER ── */
#hdr {
  flex-shrink: 0; padding: 16px 28px 12px;
  display: flex; align-items: baseline; gap: 18px;
  border-bottom: 1px solid var(--text3);
  background: linear-gradient(180deg, rgba(7,5,15,.97) 0%, transparent 100%);
  position: relative; z-index: 2;
}
#logo {
  font-family: var(--goth); font-size: 34px; color: var(--sw-body2);
  text-shadow: 0 0 22px var(--sw-body), 0 0 60px rgba(32,96,200,.25);
  letter-spacing: 4px; line-height: 1;
}
#logo-sub {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase;
}
#hdr-stats { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.hstat { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; }
.hstat span { color: var(--text2); transition: color .1s; }
.hstat span.lit { color: var(--sw-body2); text-shadow: 0 0 8px var(--sw-body); }
#power-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: all .3s; }
#power-dot.on { background: var(--sw-body2); box-shadow: 0 0 8px var(--sw-body2), 0 0 20px rgba(48,128,232,.5); }

/* ── MAIN ── */
#main { flex: 1; display: flex; overflow: hidden; position: relative; }
#main::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(32,96,200,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(32,96,200,.012) 1px, transparent 1px);
  background-size: 60px 50px; pointer-events: none;
}

/* ── CENTER: CREATURE + CONTROLS ── */
#center-col {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 20px 0; gap: 14px;
  position: relative; z-index: 1;
}

/* ── CREATURE WRAPPER ── */
#creature-wrap {
  position: relative;
  width: 320px; height: 360px;
  flex-shrink: 0;
  cursor: pointer;
  user-select: none;
}

/* Glow behind creature */
#creature-glow {
  position: absolute; inset: -30px;
  border-radius: 50%;
  background: radial-gradient(ellipse 60% 60% at 50% 52%, rgba(32,96,200,.0) 0%, transparent 70%);
  pointer-events: none; transition: background .4s;
}
#creature-glow.on {
  background: radial-gradient(ellipse 60% 60% at 50% 52%, rgba(32,96,200,.12) 0%, transparent 70%);
}

/* The SVG creature */
#creature-svg {
  width: 100%; height: 100%;
  position: relative; z-index: 2;
  transition: transform .08s;
  filter: drop-shadow(0 8px 24px rgba(32,96,200,.2));
}
#creature-svg.bounce {
  animation: creatbounce .18s ease-out;
}
@keyframes creatbounce {
  0%   { transform: scale(1) translateY(0); }
  40%  { transform: scale(1.06, 0.94) translateY(4px); }
  70%  { transform: scale(0.97, 1.03) translateY(-3px); }
  100% { transform: scale(1) translateY(0); }
}

/* ── BELLY CANVAS (swirl visualizer) ── */
#belly-canvas {
  position: absolute;
  /* Centered on belly area — updated via JS after layout */
  border-radius: 50%;
  pointer-events: none;
  z-index: 3;
}

/* ── WAVE SHAPE SELECTOR (around belly) ── */
#wave-ring {
  position: absolute;
  width: 100%; height: 100%;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 4;
}

.wave-dot {
  position: absolute;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--text3);
  background: rgba(7,5,15,.8);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  pointer-events: all;
  transition: all .18s;
  font-family: var(--mono); font-size: 8px; letter-spacing: 1px;
  color: var(--text2); text-transform: uppercase;
}
.wave-dot:hover { border-color: var(--text); color: var(--text); transform: scale(1.12); }
.wave-dot.active-sine  { border-color: var(--sine-col);  color: var(--sine-col2);  background: rgba(122,255,204,.08); box-shadow: 0 0 12px var(--sine-col); }
.wave-dot.active-square{ border-color: var(--sq-col);    color: var(--sq-col2);    background: rgba(255,128,64,.08);  box-shadow: 0 0 12px var(--sq-col); }
.wave-dot.active-sawtooth { border-color: var(--saw-col); color: var(--saw-col2); background: rgba(192,96,255,.08);  box-shadow: 0 0 12px var(--saw-col); }
.wave-dot.active-triangle { border-color: var(--tri-col); color: var(--tri-col2); background: rgba(240,192,64,.08);  box-shadow: 0 0 12px var(--tri-col); }

/* ── BOTTOM CONTROLS ── */
#bottom-controls {
  width: 100%; max-width: 480px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 10px;
}

/* Note name big display */
#note-big {
  font-family: var(--serif); font-style: italic; font-size: 28px; font-weight: 300;
  color: var(--sw-body2); text-shadow: 0 0 16px var(--sw-body);
  text-align: center; letter-spacing: 2px; line-height: 1;
  transition: color .1s;
}

/* ── KEYBOARD ── */
#kb-section {
  width: 100%; flex-shrink: 0; position: relative;
}
#keyboard {
  display: flex; height: 80px;
  border: 1px solid var(--text3); border-radius: 0 0 3px 3px;
  overflow: hidden; position: relative;
  background: var(--deep);
}
.key { position: relative; cursor: pointer; flex-shrink: 0; transition: background .04s; }
.key.white {
  background: linear-gradient(180deg,#0e0c1e 0%,#080612 100%);
  border-right: 1px solid var(--text3); flex: 1; z-index: 1;
}
.key.white:hover { background: linear-gradient(180deg,#181430 0%,#100e22 100%); }
.key.white.active { background: linear-gradient(180deg, rgba(48,128,232,.5) 0%, rgba(24,72,160,.35) 100%) !important; box-shadow: inset 0 -2px 10px rgba(48,128,232,.25); }
.key.black {
  background: linear-gradient(180deg,#04040e 0%,#08081a 100%);
  position: absolute; width: 60%; height: 62%; top: 0; z-index: 2;
  border-radius: 0 0 3px 3px; border: 1px solid var(--text3); border-top: none;
}
.key.black:hover { background: rgba(48,128,232,.1); }
.key.black.active { background: rgba(48,128,232,.25) !important; }
.key-lbl {
  position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 7px; color: var(--text3);
  pointer-events: none; user-select: none;
}
.key.active .key-lbl { color: rgba(255,255,255,.3); }

/* Oct wheel */
#oct-outer { position: absolute; left: -46px; top: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; }
#oct-wheel { width: 32px; height: 80px; background: var(--void); border: 1px solid var(--text3); border-radius: 4px; overflow: hidden; cursor: ns-resize; position: relative; user-select: none; }
#oct-wheel-inner { position: absolute; top: 0; left: 0; right: 0; transition: transform .14s cubic-bezier(.22,.68,0,1.2); }
.ow-slot { height: 18px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 8px; color: var(--text3); border-bottom: 1px solid var(--text3); flex-shrink: 0; }
.ow-slot.cur { color: var(--sw-body2); background: rgba(48,128,232,.07); }
#oct-wheel::before,#oct-wheel::after { content:'';position:absolute;left:0;right:0;height:12px;z-index:2;pointer-events:none; }
#oct-wheel::before { top:0;background:linear-gradient(to bottom,var(--void),transparent); }
#oct-wheel::after  { bottom:0;background:linear-gradient(to top,var(--void),transparent); }
#oct-lbl { font-family:var(--mono);font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:1px; }

/* ── WAVEFORM ── */
#wave-bar { flex-shrink:0;height:48px;background:var(--deep);border-top:1px solid var(--text3);position:relative;z-index:2;overflow:hidden; }
#wave-canvas { width:100%;height:100%;display:block; }

/* ── CONTROLS ── */
#controls {
  flex-shrink: 0;
  background: linear-gradient(0deg, rgba(7,5,15,.98) 0%, transparent 100%);
  border-top: 1px solid var(--text3);
  padding: 10px 24px 13px;
  display: flex; align-items: center; gap: 18px;
  position: relative; z-index: 2; flex-wrap: wrap;
}
.cdiv { width:1px;height:32px;background:var(--text3);flex-shrink:0; }
.kg { display:flex;flex-direction:column;align-items:center;gap:3px; }
canvas.knob { cursor:ns-resize;display:block; }
.kl { font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3); }
.kv { font-family:var(--mono);font-size:9px;color:var(--text2);min-width:32px;text-align:center; }

.wave-btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  padding: 5px 12px; border: 1px solid var(--text3); border-radius: 3px;
  color: var(--text2); background: transparent; cursor: pointer; transition: all .15s;
}
.wave-btn:hover { color: var(--sw-body2); border-color: var(--sw-body); }
.wave-btn.active { color: var(--sw-body2); border-color: var(--sw-body); background: rgba(32,96,200,.07); text-shadow: 0 0 8px var(--sw-body); }

#display-panel { margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px; }
#disp-note { font-family:var(--serif);font-style:italic;font-size:24px;font-weight:300;color:var(--sw-body2);text-shadow:0 0 14px var(--sw-body);line-height:1;min-width:60px;text-align:right;transition:color .08s; }
#disp-freq { font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:1px; }
#disp-wave { font-family:var(--serif);font-style:italic;font-size:11px;color:var(--text3);letter-spacing:.5px;transition:color .3s; }

::-webkit-scrollbar { display:none; }
</style>
</head>
<body>

<!-- Cursor: little swirl -->
<div id="cursor">
  <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 10 C10 6 14 4 14 8 C14 12 10 14 8 12 C6 10 8 6 10 6"
      fill="none" stroke="rgba(48,128,232,.8)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="10" cy="10" r="1.5" fill="rgba(48,128,232,.9)"/>
  </svg>
</div>

<canvas id="atmos"></canvas>

<div id="app">
  <div id="hdr">
    <div>
      <div id="logo">Pocket Monster</div>
      <div id="logo-sub">Swirly · Wave Shaper · 4 Oscillator Modes</div>
    </div>
    <div id="hdr-stats">
      <div class="hstat">Wave <span id="hs-wave">sine</span></div>
      <div class="hstat">Note <span id="hs-note">—</span></div>
      <div class="hstat">Voices <span id="hs-voices">0</span></div>
      <div id="power-dot"></div>
    </div>
  </div>

  <div id="main">
    <div id="center-col">

      <!-- CREATURE -->
      <div id="creature-wrap">
        <div id="creature-glow"></div>

        <!-- Belly canvas sits on top of SVG in the stomach area -->
        <canvas id="belly-canvas"></canvas>

        <!-- Wave selector dots around the creature -->
        <div id="wave-ring">
          <!-- Positioned by JS -->
        </div>

        <svg id="creature-svg" viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="body-g" cx="45%" cy="40%" r="60%">
              <stop offset="0%"  stop-color="#4898f8"/>
              <stop offset="50%" stop-color="#2868d8"/>
              <stop offset="100%" stop-color="#103888"/>
            </radialGradient>
            <radialGradient id="belly-g" cx="45%" cy="42%" r="55%">
              <stop offset="0%"  stop-color="#f8f4ee"/>
              <stop offset="70%" stop-color="#e0d8c8"/>
              <stop offset="100%" stop-color="#c8bca8"/>
            </radialGradient>
            <radialGradient id="eye-g" cx="38%" cy="35%" r="55%">
              <stop offset="0%"  stop-color="#3060c0"/>
              <stop offset="100%" stop-color="#0a1838"/>
            </radialGradient>
            <radialGradient id="tail-g" cx="40%" cy="35%" r="65%">
              <stop offset="0%"  stop-color="#3878e8"/>
              <stop offset="100%" stop-color="#0e2870"/>
            </radialGradient>
            <filter id="creature-shadow">
              <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(16,40,100,.4)"/>
            </filter>
            <clipPath id="belly-clip">
              <!-- Clips the belly canvas to the belly shape -->
              <ellipse cx="158" cy="218" rx="52" ry="52"/>
            </clipPath>
          </defs>

          <!-- ── TAIL (behind body) ── -->
          <path id="tail-path"
            d="M 220 240 C 260 230 300 200 295 165 C 290 140 270 130 255 145 C 240 160 250 185 235 195 C 220 205 205 198 210 220 Z"
            fill="url(#tail-g)" stroke="rgba(16,56,136,.4)" stroke-width="1.5">
            <animateTransform attributeName="transform" type="rotate"
              values="0 230 200; 4 230 200; -3 230 200; 0 230 200"
              dur="2.5s" repeatCount="indefinite" id="tail-anim"/>
          </path>

          <!-- ── MAIN BODY ── -->
          <ellipse cx="155" cy="185" rx="105" ry="115"
            fill="url(#body-g)" stroke="rgba(16,56,136,.3)" stroke-width="1.5"
            filter="url(#creature-shadow)"/>

          <!-- Body highlight -->
          <ellipse cx="128" cy="148" rx="38" ry="28" fill="rgba(255,255,255,.1)" transform="rotate(-20 128 148)"/>

          <!-- ── BELLY (lighter oval on front) ── -->
          <ellipse id="belly-ellipse" cx="158" cy="218" rx="52" ry="52"
            fill="url(#belly-g)" stroke="rgba(200,185,165,.3)" stroke-width="1"/>

          <!-- ── EYES ── -->
          <!-- Left eye -->
          <ellipse cx="122" cy="140" rx="22" ry="24" fill="white" stroke="rgba(16,56,136,.3)" stroke-width="1"/>
          <ellipse cx="122" cy="142" rx="16" ry="17" fill="url(#eye-g)"/>
          <ellipse cx="122" cy="142" rx="9"  ry="9.5" fill="#080e28"/>
          <circle  cx="127" cy="137" r="4"   fill="white" opacity=".9"/>
          <circle  cx="118" cy="145" r="2"   fill="white" opacity=".5"/>

          <!-- Right eye -->
          <ellipse cx="188" cy="140" rx="22" ry="24" fill="white" stroke="rgba(16,56,136,.3)" stroke-width="1"/>
          <ellipse cx="188" cy="142" rx="16" ry="17" fill="url(#eye-g)"/>
          <ellipse cx="188" cy="142" rx="9"  ry="9.5" fill="#080e28"/>
          <circle  cx="193" cy="137" r="4"   fill="white" opacity=".9"/>
          <circle  cx="184" cy="145" r="2"   fill="white" opacity=".5"/>

          <!-- Eye shine animation (blink occasionally) -->
          <ellipse id="blink-l" cx="122" cy="140" rx="22" ry="0" fill="url(#body-g)" opacity="0">
            <animate attributeName="ry" values="0;24;0" dur="0.15s" begin="4s;8s;13s;19s;25s" fill="freeze"/>
            <animate attributeName="opacity" values="0;1;0" dur="0.15s" begin="4s;8s;13s;19s;25s" fill="freeze"/>
          </ellipse>
          <ellipse id="blink-r" cx="188" cy="140" rx="22" ry="0" fill="url(#body-g)" opacity="0">
            <animate attributeName="ry" values="0;24;0" dur="0.15s" begin="4s;8s;13s;19s;25s" fill="freeze"/>
            <animate attributeName="opacity" values="0;1;0" dur="0.15s" begin="4s;8s;13s;19s;25s" fill="freeze"/>
          </ellipse>

          <!-- ── MOUTH (little smile) ── -->
          <path id="mouth-path"
            d="M 140 238 Q 155 250 170 238"
            fill="none" stroke="rgba(80,50,30,.5)" stroke-width="2" stroke-linecap="round"/>

          <!-- ── SMALL DOTS on belly (like the real design) ── -->
          <!-- Drawn by swirl canvas now, but keep a subtle outline of the belly -->

          <!-- ── FEET ── -->
          <!-- Left foot -->
          <ellipse cx="110" cy="295" rx="28" ry="16" fill="url(#body-g)" stroke="rgba(16,56,136,.3)" stroke-width="1"/>
          <path d="M 86 292 C 84 296 88 300 92 298" fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1" stroke-linecap="round"/>
          <path d="M 96 298 C 95 303 100 306 104 303" fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1" stroke-linecap="round"/>
          <path d="M 110 300 C 110 305 115 307 118 304" fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1" stroke-linecap="round"/>

          <!-- Right foot -->
          <ellipse cx="200" cy="295" rx="28" ry="16" fill="url(#body-g)" stroke="rgba(16,56,136,.3)" stroke-width="1"/>
          <path d="M 176 292 C 174 296 178 300 182 298" fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1" stroke-linecap="round"/>
          <path d="M 188 298 C 187 303 192 306 196 303" fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1" stroke-linecap="round"/>
          <path d="M 202 300 C 202 305 207 307 210 304" fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1" stroke-linecap="round"/>

          <!-- ── ARMS (little stubby) ── -->
          <!-- Left arm -->
          <path d="M 55 185 C 45 178 42 168 48 162 C 54 156 65 160 70 170 C 75 180 72 192 65 195 Z"
            fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1"/>
          <!-- Right arm -->
          <path d="M 255 185 C 265 178 268 168 262 162 C 256 156 245 160 240 170 C 235 180 238 192 245 195 Z"
            fill="url(#body-g)" stroke="rgba(16,56,136,.25)" stroke-width="1"/>

          <!-- ── SWIRL overlay (drawn by JS canvas on top) ── -->
          <!-- Belly ellipse outline on top of canvas -->
          <ellipse cx="158" cy="218" rx="52" ry="52"
            fill="none" stroke="rgba(200,185,165,.18)" stroke-width="0.8"/>

        </svg>
      </div>

      <!-- WAVE BUTTONS below creature -->
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="wave-btn active" data-wave="sine">Sine</button>
        <button class="wave-btn" data-wave="square">Square</button>
        <button class="wave-btn" data-wave="sawtooth">Saw</button>
        <button class="wave-btn" data-wave="triangle">Triangle</button>
      </div>

      <!-- KEYBOARD -->
      <div id="kb-section" style="position:relative;width:100%;max-width:520px;">
        <div id="oct-outer">
          <div id="oct-wheel"><div id="oct-wheel-inner"></div></div>
          <div id="oct-lbl">Oct</div>
        </div>
        <div id="keyboard"></div>
      </div>

    </div>
  </div>

  <div id="wave-bar"><canvas id="wave-canvas"></canvas></div>

  <div id="controls">
    <div class="kg">
      <canvas class="knob" id="k-reverb"  width="42" height="42" data-min="0"    data-max="1"   data-val="0.3"  data-color="#3080e8"></canvas>
      <div class="kl">Reverb</div><div class="kv" id="v-reverb">0.30</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-attack"  width="42" height="42" data-min="0.003" data-max="2"  data-val="0.02" data-color="#7affcc"></canvas>
      <div class="kl">Attack</div><div class="kv" id="v-attack">0.02</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-release" width="42" height="42" data-min="0.05"  data-max="4"  data-val="0.6"  data-color="#c060ff"></canvas>
      <div class="kl">Release</div><div class="kv" id="v-release">0.60</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-detune"  width="42" height="42" data-min="0"     data-max="50" data-val="0"    data-color="#f0c040"></canvas>
      <div class="kl">Detune</div><div class="kv" id="v-detune">0</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-filter"  width="42" height="42" data-min="0"     data-max="1"  data-val="0.7"  data-color="#ff8040"></canvas>
      <div class="kl">Filter</div><div class="kv" id="v-filter">0.70</div>
    </div>

    <div class="cdiv"></div>

    <div id="display-panel">
      <div id="disp-note">—</div>
      <div id="disp-freq">— Hz</div>
      <div id="disp-wave">sine</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// POCKET MONSTER — Swirly
// Wave shaper synth with belly visualizer
// ══════════════════════════════════════════════════════════════

let actx = null, convolver = null, analyser = null;
const activeVoices = new Map();
let currentWave = 'sine';
let swirlPhase = 0;
let swirlSpeed = 0;   // driven by audio energy
let swirlEnergy = 0;  // smoothed amplitude

function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  if (!convolver) buildReverb();
  if (!analyser) {
    analyser = actx.createAnalyser(); analyser.fftSize = 256;
    analyser.connect(actx.destination);
  }
  return actx;
}

const P = { reverb:0.3, attack:0.02, release:0.6, detune:0, filter:0.7 };

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiToFreq(n) { return 440*Math.pow(2,(n-69)/12); }
function midiName(n)   { return NOTE_NAMES[n%12]+(Math.floor(n/12)-1); }

// Wave display colors
const WAVE_COLORS = {
  sine:     { main:'#7affcc', glow:'rgba(122,255,204,.35)' },
  square:   { main:'#ff8040', glow:'rgba(255,128,64,.35)'  },
  sawtooth: { main:'#c060ff', glow:'rgba(192,96,255,.35)'  },
  triangle: { main:'#f0c040', glow:'rgba(240,192,64,.35)'  },
};

// ── Reverb ──
function buildReverb() {
  const c=actx,len=c.sampleRate*2.5,buf=c.createBuffer(2,len,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);}
  if(convolver)try{convolver.disconnect()}catch(e){}
  convolver=c.createConvolver();convolver.buffer=buf;convolver.connect(c.destination);
}

// ── Voice synthesis ──
function playNote(noteNum, vel=0.75) {
  if (activeVoices.has(noteNum)) return;
  const c = getCtx();
  const freq = midiToFreq(noteNum);
  const now  = c.currentTime;

  // Main oscillator
  const osc = c.createOscillator();
  osc.type = currentWave;
  osc.frequency.value = freq;
  osc.detune.value = P.detune;

  // Detune layer for width
  let osc2 = null, osc2g = null;
  if (P.detune > 0) {
    osc2 = c.createOscillator();
    osc2.type = currentWave;
    osc2.frequency.value = freq;
    osc2.detune.value = -P.detune;
    osc2g = c.createGain(); osc2g.gain.value = 0.4;
    osc2.connect(osc2g);
  }

  // Filter
  const lpf = c.createBiquadFilter(); lpf.type='lowpass';
  lpf.frequency.value = 200 + P.filter * 8000;
  lpf.Q.value = 1.2;

  // Envelope
  const env = c.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(vel*0.7, now+P.attack);
  env.gain.setValueAtTime(vel*0.7, now+P.attack+0.001);

  osc.connect(lpf); lpf.connect(env);
  if (osc2g) osc2g.connect(lpf);

  // Route
  const dry=c.createGain(); dry.gain.value=1-P.reverb*0.85;
  const wet=c.createGain(); wet.gain.value=P.reverb*0.85;
  env.connect(dry); dry.connect(analyser);
  env.connect(wet); wet.connect(convolver);

  osc.start(now); if(osc2) osc2.start(now);
  activeVoices.set(noteNum, { osc, osc2, env, dry, wet });

  updateDisplay(noteNum, freq);
  bounceCreature();
  document.getElementById('hs-voices').textContent=activeVoices.size;
  document.getElementById('power-dot').classList.add('on');
}

function releaseNote(noteNum) {
  const v = activeVoices.get(noteNum);
  if (!v) return;
  const c = actx; const now = c.currentTime;
  v.env.gain.cancelScheduledValues(now);
  v.env.gain.setValueAtTime(v.env.gain.value, now);
  v.env.gain.exponentialRampToValueAtTime(0.0001, now+P.release);
  setTimeout(()=>{
    try{v.osc.stop()}catch(e){}
    try{v.osc2?.stop()}catch(e){}
    try{v.dry.disconnect();v.wet.disconnect();v.env.disconnect()}catch(e){}
  }, (P.release+0.1)*1000);
  activeVoices.delete(noteNum);
  document.getElementById('hs-voices').textContent=activeVoices.size;
  if(activeVoices.size===0){
    document.getElementById('power-dot').classList.remove('on');
  }
}

function updateDisplay(noteNum, freq) {
  const name=NOTE_NAMES[noteNum%12];
  document.getElementById('disp-note').textContent=name;
  document.getElementById('disp-freq').textContent=Math.round(freq)+' Hz';
  document.getElementById('hs-note').textContent=midiName(noteNum);
  document.getElementById('hs-note').className='lit';
  clearTimeout(window._noteT);window._noteT=setTimeout(()=>document.getElementById('hs-note').className='',400);
  // Color per wave
  const wc = WAVE_COLORS[currentWave];
  document.getElementById('disp-note').style.color=wc.main;
  document.getElementById('disp-note').style.textShadow=`0 0 14px ${wc.main}`;
}

function bounceCreature() {
  const svg=document.getElementById('creature-svg');
  svg.classList.remove('bounce');
  void svg.offsetWidth;
  svg.classList.add('bounce');
}

// ══════════════════════════════════════════════════════════════
// BELLY SWIRL VISUALIZER
// The swirl shape, speed, color, and style all change
// depending on which wave shape is active
// ══════════════════════════════════════════════════════════════
const bellyCanvas = document.getElementById('belly-canvas');
const bCtx = bellyCanvas.getContext('2d');
let bellyT = 0;

// Position the belly canvas over the belly area
function positionBelly() {
  const wrap = document.getElementById('creature-wrap');
  const rect = wrap.getBoundingClientRect();
  // Belly ellipse center: (158/320)*wrapW, (218/320)*wrapH
  const scale = rect.width / 320;
  const bCx = 158*scale;
  const bCy = 218*scale;
  const bRx = 52*scale;
  const bRy = 52*scale;
  const size = Math.max(bRx, bRy)*2+4;

  bellyCanvas.style.position='absolute';
  bellyCanvas.style.left=(bCx - size/2)+'px';
  bellyCanvas.style.top =(bCy - size/2)+'px';
  bellyCanvas.style.width=size+'px';
  bellyCanvas.style.height=size+'px';
  bellyCanvas.width  = Math.round(size*2);
  bellyCanvas.height = Math.round(size*2);
}

function drawBelly() {
  requestAnimationFrame(drawBelly);

  const W=bellyCanvas.width, H=bellyCanvas.height;
  const cx=W/2, cy=H/2;

  // Get audio energy
  let energy=0;
  if (analyser) {
    const buf=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(buf);
    let sum=0;
    for(let i=0;i<buf.length;i++) sum+=Math.abs(buf[i]-128);
    energy=sum/buf.length/128;
  }
  swirlEnergy = swirlEnergy*0.85 + energy*0.15;
  const e = swirlEnergy;

  // Fade background (with slight belly color)
  bCtx.fillStyle='rgba(232,224,208,.18)';
  bCtx.fillRect(0,0,W,H);

  // Advance phase
  const baseSpeed = { sine:0.018, square:0.032, sawtooth:0.025, triangle:0.022 }[currentWave] || 0.02;
  bellyT += baseSpeed + e*0.08;

  const wc = WAVE_COLORS[currentWave];

  // ── DRAW THE SWIRL ──
  switch(currentWave) {

    case 'sine': {
      // Smooth spiral: concentric rotating rings, soft and fluid
      const rings = 5;
      for(let r=0;r<rings;r++){
        const frac = (r+1)/rings;
        const radius = (cx*0.75)*frac*(0.8+e*0.3);
        const alpha = 0.15 + frac*0.25 + e*0.2;
        bCtx.beginPath();
        const steps=128;
        for(let i=0;i<=steps;i++){
          const a = (i/steps)*Math.PI*2 + bellyT*(1+frac*0.5);
          const wobble = Math.sin(a*3+bellyT*2)*radius*0.12*(1+e*2);
          const px = cx + Math.cos(a)*(radius+wobble);
          const py = cy + Math.sin(a)*(radius+wobble);
          i===0?bCtx.moveTo(px,py):bCtx.lineTo(px,py);
        }
        bCtx.closePath();
        bCtx.strokeStyle=`rgba(122,255,204,${alpha})`;
        bCtx.lineWidth=1.2+e*2;
        bCtx.stroke();
      }
      // Center dot
      const dotR = 6+e*12;
      const grd=bCtx.createRadialGradient(cx,cy,0,cx,cy,dotR);
      grd.addColorStop(0,`rgba(122,255,204,${0.6+e*0.4})`);
      grd.addColorStop(1,'rgba(122,255,204,0)');
      bCtx.fillStyle=grd;
      bCtx.beginPath();bCtx.arc(cx,cy,dotR,0,Math.PI*2);bCtx.fill();
      break;
    }

    case 'square': {
      // Angular spiral: rotating squares that snap edges, choppy
      const layers=4;
      for(let l=0;l<layers;l++){
        const frac=(l+1)/layers;
        const size=(cx*0.7)*frac*(0.85+e*0.25);
        const angle=bellyT*(1.5-frac*0.5)+(l*Math.PI/4);
        bCtx.save();
        bCtx.translate(cx,cy);
        bCtx.rotate(angle);
        bCtx.beginPath();
        bCtx.rect(-size,-size,size*2,size*2);
        const alpha=0.12+frac*0.2+e*0.25;
        bCtx.strokeStyle=`rgba(255,128,64,${alpha})`;
        bCtx.lineWidth=1.5+e*2.5;
        bCtx.stroke();
        bCtx.restore();
      }
      // Pixel sparks on edges
      const sparks=6;
      for(let s=0;s<sparks;s++){
        const a=bellyT*2+s*(Math.PI*2/sparks);
        const r=cx*0.55+e*cx*0.3;
        const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
        bCtx.fillStyle=`rgba(255,160,80,${0.3+e*0.5})`;
        const sz=2+e*4;
        bCtx.fillRect(px-sz/2,py-sz/2,sz,sz);
      }
      break;
    }

    case 'sawtooth': {
      // Sweeping spiral arms: asymmetric, like a pinwheel
      const arms=3;
      for(let arm=0;arm<arms;arm++){
        const armAngle=(arm/arms)*Math.PI*2 + bellyT;
        bCtx.beginPath();
        const steps=80;
        for(let i=0;i<=steps;i++){
          const t=i/steps;
          const a=armAngle + t*Math.PI*1.6; // sweeping arc
          const r=(cx*0.72)*t*(0.8+e*0.35);
          const px=cx+Math.cos(a)*r;
          const py=cy+Math.sin(a)*r;
          i===0?bCtx.moveTo(px,py):bCtx.lineTo(px,py);
        }
        bCtx.strokeStyle=`rgba(192,96,255,${0.25+e*0.35})`;
        bCtx.lineWidth=1.5+e*2;
        bCtx.stroke();
      }
      // Trailing fade dots
      for(let i=0;i<8;i++){
        const a=bellyT*1.8+i*(Math.PI*2/8);
        const r=cx*(0.3+i*0.07)*(1+e*0.3);
        const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
        bCtx.fillStyle=`rgba(208,128,255,${0.15+e*0.3})`;
        const sz=2+e*3;
        bCtx.beginPath();bCtx.arc(px,py,sz,0,Math.PI*2);bCtx.fill();
      }
      break;
    }

    case 'triangle': {
      // Star/triangle pattern: symmetric, pointed, pulsing
      const points=6;
      for(let ring=1;ring<=4;ring++){
        const r=cx*0.18*ring*(1+e*0.3);
        const angle=bellyT*(ring%2===0?1:-1);
        bCtx.beginPath();
        for(let p=0;p<points;p++){
          const a=angle+(p/points)*Math.PI*2;
          const aNext=angle+((p+0.5)/points)*Math.PI*2;
          // Outer point
          const px=cx+Math.cos(a)*r;
          const py=cy+Math.sin(a)*r;
          // Inner notch
          const inR=r*0.5;
          const ix=cx+Math.cos(aNext)*inR;
          const iy=cy+Math.sin(aNext)*inR;
          p===0?bCtx.moveTo(px,py):bCtx.lineTo(px,py);
          bCtx.lineTo(ix,iy);
        }
        bCtx.closePath();
        const alpha=0.12+ring*0.06+e*0.2;
        bCtx.strokeStyle=`rgba(240,192,64,${alpha})`;
        bCtx.lineWidth=1.2+e*2;
        bCtx.stroke();
        // Fill inner slightly
        bCtx.fillStyle=`rgba(240,192,64,${alpha*0.12})`;
        bCtx.fill();
      }
      break;
    }
  }

  // Belly glow when playing
  const wc2 = WAVE_COLORS[currentWave];
  const grd2=bCtx.createRadialGradient(cx,cy,0,cx,cy,cx);
  grd2.addColorStop(0,wc2.glow.replace('.35',`${e*0.5}`));
  grd2.addColorStop(1,'rgba(0,0,0,0)');
  bCtx.fillStyle=grd2;
  bCtx.fillRect(0,0,W,H);
}

// ── Wave shape switcher ──
function setWave(wave) {
  currentWave = wave;

  // Update all held voices
  activeVoices.forEach(v => { try{v.osc.type=wave; if(v.osc2)v.osc2.type=wave;}catch(e){} });

  // Update UI
  const wc = WAVE_COLORS[wave];
  document.getElementById('disp-wave').textContent=wave;
  document.getElementById('disp-wave').style.color=wc.main;
  document.getElementById('hs-wave').textContent=wave;

  // Creature glow color
  const svg=document.getElementById('creature-svg');
  document.getElementById('creature-glow').style.background=
    `radial-gradient(ellipse 60% 60% at 50% 52%, ${wc.glow} 0%, transparent 70%)`;

  // Button states
  document.querySelectorAll('.wave-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.wave===wave);
  });
}

// ── Creature click ──
document.getElementById('creature-wrap').addEventListener('click', e => {
  if (e.target.closest('.wave-dot')) return;
  // Bounce and cycle wave on click
  bounceCreature();
  const waves=['sine','square','sawtooth','triangle'];
  const next=waves[(waves.indexOf(currentWave)+1)%waves.length];
  setWave(next);
});

document.querySelectorAll('.wave-btn').forEach(btn=>{
  btn.addEventListener('click',()=>setWave(btn.dataset.wave));
});

// ══════════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════════
const WHITE_KEYS=[0,2,4,5,7,9,11];
const BLACK_SLOTS=[1,3,null,6,8,10,null];
const KB_WHITE={a:0,s:1,d:2,f:3,g:4,h:5,j:6,k:7};
const KB_BLACK={w:0,e:1,t:3,y:4,u:5};
let kbOctave=4;
const KB_OCT_MIN=1,KB_OCT_MAX=7,KB_SLOT_H=18;

function buildKB(){
  const el=document.getElementById('keyboard');el.innerHTML='';
  const base=kbOctave*12+12;
  for(let i=0;i<8;i++){
    const n=base+WHITE_KEYS[i%7];
    const wk=document.createElement('div');wk.className='key white';wk.dataset.note=n;
    wk.innerHTML=`<span class="key-lbl">${['A','S','D','F','G','H','J','K'][i]}</span>`;
    el.appendChild(wk);
  }
  requestAnimationFrame(()=>{
    el.querySelectorAll('.key.white').forEach((wk,i)=>{
      const slot=BLACK_SLOTS[i%7];if(slot==null)return;
      const n=base+slot;
      const bk=document.createElement('div');bk.className='key black';bk.dataset.note=n;
      bk.style.left=(wk.offsetLeft+wk.offsetWidth*.6)+'px';
      const lbls=['W','E','','T','Y','U',''];
      if(lbls[i])bk.innerHTML=`<span class="key-lbl">${lbls[i]}</span>`;
      el.appendChild(bk);
    });
    el.querySelectorAll('.key').forEach(k=>{
      const n=parseInt(k.dataset.note);
      k.addEventListener('mousedown',e=>{e.preventDefault();getCtx();playNote(n);k.classList.add('active');});
      k.addEventListener('mouseup',()=>{releaseNote(n);k.classList.remove('active');});
      k.addEventListener('mouseleave',()=>{if(activeVoices.has(n)){releaseNote(n);k.classList.remove('active');}});
      k.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();getCtx();playNote(n);k.classList.add('active');},{passive:false});
      k.addEventListener('touchend',e=>{e.preventDefault();releaseNote(n);k.classList.remove('active');},{passive:false});
    });
  });
}

function buildOctWheel(){
  const inner=document.getElementById('oct-wheel-inner');inner.innerHTML='';
  for(let o=KB_OCT_MAX;o>=KB_OCT_MIN;o--){
    const s=document.createElement('div');
    s.className='ow-slot'+(o===kbOctave?' cur':'');
    s.textContent='C'+o;s.dataset.oct=o;inner.appendChild(s);
  }
  scrollOW();
}
function scrollOW(){
  const inner=document.getElementById('oct-wheel-inner');
  const wH=document.getElementById('oct-wheel').clientHeight||80;
  inner.style.transform=`translateY(${wH/2-KB_SLOT_H/2-(KB_OCT_MAX-kbOctave)*KB_SLOT_H}px)`;
  inner.querySelectorAll('.ow-slot').forEach(s=>s.classList.toggle('cur',parseInt(s.dataset.oct)===kbOctave));
}
(function(){
  const wh=document.getElementById('oct-wheel');let sy=null,so=null;
  wh.addEventListener('mousedown',e=>{sy=e.clientY;so=kbOctave;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(sy===null)return;const d=Math.round((sy-e.clientY)/KB_SLOT_H);const n=Math.max(KB_OCT_MIN,Math.min(KB_OCT_MAX,so+d));if(n!==kbOctave){kbOctave=n;scrollOW();buildKB();}});
  document.addEventListener('mouseup',()=>{sy=null;});
  wh.addEventListener('wheel',e=>{e.preventDefault();kbOctave=Math.max(KB_OCT_MIN,Math.min(KB_OCT_MAX,kbOctave+(e.deltaY>0?-1:1)));scrollOW();buildKB();},{passive:false});
  wh.addEventListener('click',e=>{const s=e.target.closest('.ow-slot');if(s){kbOctave=parseInt(s.dataset.oct);scrollOW();buildKB();}});
})();

document.addEventListener('keydown',e=>{
  if(e.repeat||e.target.tagName==='INPUT')return;
  const key=e.key.toLowerCase();
  if(key==='z'){kbOctave=Math.max(KB_OCT_MIN,kbOctave-1);scrollOW();buildKB();return;}
  if(key==='x'){kbOctave=Math.min(KB_OCT_MAX,kbOctave+1);scrollOW();buildKB();return;}
  // Wave shortcuts
  if(key==='1')setWave('sine');
  if(key==='2')setWave('square');
  if(key==='3')setWave('sawtooth');
  if(key==='4')setWave('triangle');
  const base=kbOctave*12+12;let n=null;
  if(KB_WHITE[key]!==undefined)n=base+WHITE_KEYS[KB_WHITE[key]];
  else if(KB_BLACK[key]!==undefined){const s=BLACK_SLOTS[KB_BLACK[key]];if(s!=null)n=base+s;}
  if(n!==null&&!activeVoices.has(n)){getCtx();playNote(n);document.getElementById('keyboard')?.querySelectorAll('.key').forEach(k=>{if(parseInt(k.dataset.note)===n)k.classList.add('active');});}
});
document.addEventListener('keyup',e=>{
  const key=e.key.toLowerCase();const base=kbOctave*12+12;let n=null;
  if(KB_WHITE[key]!==undefined)n=base+WHITE_KEYS[KB_WHITE[key]];
  else if(KB_BLACK[key]!==undefined){const s=BLACK_SLOTS[KB_BLACK[key]];if(s!=null)n=base+s;}
  if(n!==null){releaseNote(n);document.getElementById('keyboard')?.querySelectorAll('.key').forEach(k=>{if(parseInt(k.dataset.note)===n)k.classList.remove('active');});}
});

// ── Knobs ──
function setupKnobs(){
  document.querySelectorAll('canvas.knob').forEach(canvas=>{
    const id=canvas.id,min=parseFloat(canvas.dataset.min),max=parseFloat(canvas.dataset.max);
    let val=parseFloat(canvas.dataset.val);
    const color=canvas.dataset.color||'#3080e8';
    const valEl=document.getElementById('v-'+id.replace('k-',''));
    function draw(){
      const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=w*0.38;
      ctx.clearRect(0,0,w,h);
      const sA=Math.PI*.75,eA=Math.PI*2.25,t=(val-min)/(max-min),cA=sA+t*(eA-sA);
      ctx.beginPath();ctx.arc(cx,cy,r,sA,eA);ctx.strokeStyle='#2a2438';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,r,sA,cA);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
      const dx=cx+r*Math.cos(cA),dy=cy+r*Math.sin(cA);
      ctx.beginPath();ctx.arc(dx,dy,2.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fillStyle='#1e1830';ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    }
    let dragY=null,dragVal=null;
    canvas.addEventListener('mousedown',e=>{dragY=e.clientY;dragVal=val;e.preventDefault();});
    document.addEventListener('mousemove',e=>{if(dragY===null)return;val=Math.max(min,Math.min(max,dragVal+(dragY-e.clientY)*(max-min)/120));draw();onKnob(id,val,valEl);});
    document.addEventListener('mouseup',()=>{dragY=null;});
    draw();onKnob(id,val,valEl);
  });
}
function onKnob(id,val,el){
  const map={
    'k-reverb':  v=>{P.reverb=v;  el.textContent=v.toFixed(2);},
    'k-attack':  v=>{P.attack=v;  el.textContent=v.toFixed(2);},
    'k-release': v=>{P.release=v; el.textContent=v.toFixed(2);},
    'k-detune':  v=>{P.detune=v;  el.textContent=Math.round(v); activeVoices.forEach(voice=>{try{voice.osc.detune.value=v;if(voice.osc2)voice.osc2.detune.value=-v;}catch(e){}});},
    'k-filter':  v=>{P.filter=v;  el.textContent=v.toFixed(2);},
  };
  if(map[id])map[id](val);
}

// ── Waveform ──
const waveCanvas=document.getElementById('wave-canvas');
const wCtx=waveCanvas.getContext('2d');
function resizeWave(){waveCanvas.width=waveCanvas.offsetWidth;waveCanvas.height=waveCanvas.offsetHeight;}
function drawWave(){
  requestAnimationFrame(drawWave);
  const W=waveCanvas.width,H=waveCanvas.height;
  wCtx.clearRect(0,0,W,H);
  if(!analyser)return;
  const buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  const wc=WAVE_COLORS[currentWave];
  wCtx.strokeStyle=wc.main.replace(')',',0.55)').replace('rgb','rgba').replace('#','rgba(').split(',0.55')[0];
  // simpler:
  wCtx.strokeStyle=`${wc.main}99`;
  wCtx.lineWidth=1.4;wCtx.shadowColor=wc.main;wCtx.shadowBlur=5;
  wCtx.beginPath();
  const step=W/buf.length;
  for(let i=0;i<buf.length;i++){const x=i*step,y=(buf[i]/128-1)*(H*.42)+H/2;i===0?wCtx.moveTo(x,y):wCtx.lineTo(x,y);}
  wCtx.stroke();wCtx.shadowBlur=0;
}

// ── Atmosphere: small blue bubbles ──
const atmosCanvas=document.getElementById('atmos');
const aC=atmosCanvas.getContext('2d');
let bubbles=[];
function initAtmos(){
  atmosCanvas.width=window.innerWidth;atmosCanvas.height=window.innerHeight;
  bubbles=Array.from({length:35},()=>({
    x:Math.random()*atmosCanvas.width,
    y:Math.random()*atmosCanvas.height,
    r:Math.random()*3+1,
    sp:Math.random()*.12+.02,
    o:Math.random()*.1+.01,
    t:Math.random()*Math.PI*2,
    wobble:(Math.random()-.5)*.3,
  }));
}
function drawAtmos(){
  requestAnimationFrame(drawAtmos);
  aC.clearRect(0,0,atmosCanvas.width,atmosCanvas.height);
  const wc=WAVE_COLORS[currentWave];
  bubbles.forEach(p=>{
    p.t+=p.sp*.016;
    p.x+=p.wobble+Math.sin(p.t*.6)*.3;
    p.y-=p.sp*.4;
    if(p.y<-p.r*2){p.y=atmosCanvas.height+p.r;p.x=Math.random()*atmosCanvas.width;}
    const fl=p.o*(0.5+0.5*Math.sin(p.t*2.2));
    // Mix between body blue and wave color
    aC.beginPath();aC.arc(p.x,p.y,p.r,0,Math.PI*2);
    const col=Math.random()>0.5?`rgba(48,128,232,${fl})`:`${wc.main}${Math.floor(fl*255).toString(16).padStart(2,'0')}`;
    aC.fillStyle=`rgba(48,128,232,${fl})`;
    aC.fill();
    // Tiny highlight
    if(p.r>2){aC.beginPath();aC.arc(p.x-p.r*.3,p.y-p.r*.3,p.r*.3,0,Math.PI*2);aC.fillStyle=`rgba(200,230,255,${fl*.5})`;aC.fill();}
  });
}

// ── Cursor ──
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});

window.addEventListener('resize',()=>{resizeWave();initAtmos();positionBelly();buildKB();});

setupKnobs();
resizeWave();
initAtmos();
drawAtmos();
drawWave();
drawBelly();
buildKB();
buildOctWheel();
positionBelly();
setWave('sine');
</script>
